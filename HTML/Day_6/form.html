<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Handling</title>
</head>
<body>
    <center>
        <form>
            <label for="firstname">Enter Your First Name</label>
            <br>
            <input type="text" placeholder="    Start with Capital letter" required/>
            <br>
            <br>
            <label for="lastname">Enter Your Last Name</label>
            <br>
            <input type="text" placeholder="    Last name or Initial" required/>
            <br>
            <br>
            <label for="mobile">Enter Your Mobile Number</label>
            <br>
            <input type="number" maxlength="10" placeholder="    10 Digit Phone Number" required>
            <br>
            <br>
            <label for="email">Enter Your Email Address</label>
            <br>
            <input type="text" placeholder="       abc@gmail.com" required/>
            <br>
            <br>
            <label for="degree">Enter Your Degree</label>
            <br>
            <select required >
                <option value="" selected disabled>Select a Value</option>
                <option value="engineering">B.E</option>
                <option value="medical">M.B.B.S</option>
                <option value="science">B.Sc</option>
                <option value="arts">B.Com</option>
                <option value="technology">B.Tech</option>
                <option value="others">Others</option>
            </select>
            <br>
            <br>
            <label for="college">Enter Your College Name</label>
            <br>
            <input type="text" placeholder="abc college of engineering" required>
            <br>
            <br>
            <label for="comments">Enter Your Feedback & Queries</label>
            <br>
            <textarea></textarea>
            <br>
            <br>
            <input type="submit">
            </center>
        </form>
</body>
</html>
