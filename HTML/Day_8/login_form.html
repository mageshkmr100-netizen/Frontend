<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <center>
        <h1>    Login to your Account</h1>
        <form method="post">
            <table>
                <tr>
                    <td><label for="firstname">Enter Your UserName</label></td>
                    <td><input type="text" placeholder="UserName or EMail" required /></td>
                </tr>
                <tr>
                    <td><label for="password">Enter Your Password</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label>Remember Me</label></td>
                    <td>
                    <input type="checkbox" name="remember">
                    </td>
                </tr>
                <tr>
                    <td><input type="submit" value="Login" /></td>
                </tr>
            </table>
        </form>

<br>
    </center>
</body>
</html>
